name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Generate native Android folder
        run: npx expo prebuild --platform android --no-install

      - name: Inspect and fix build.gradle
        run: |
          echo "=== android/app/build.gradle first 30 lines ==="
          head -30 android/app/build.gradle
          echo "=== END ==="
          # Use Python to fix any file('') calls with file('debug.keystore')
          python3 -c "
import re
with open('android/app/build.gradle', 'r') as f:
    content = f.read()
print('=== ORIGINAL LINES 10-15 ===')
lines = content.split(chr(10))
for i, line in enumerate(lines[9:15], start=10):
    print(f'{i}: {repr(line)}')
# Fix: replace file('') or file(\"\") with file('debug.keystore')
content = re.sub(r\"file\\(('|\\\")\\1\\)\", \"file('debug.keystore')\", content)
# Also fix storeFile null patterns
content = content.replace(\"storeFile null\", \"storeFile file('debug.keystore')\")
with open('android/app/build.gradle', 'w') as f:
    f.write(content)
print('=== PATCHED LINES 10-15 ===')
lines = content.split(chr(10))
for i, line in enumerate(lines[9:15], start=10):
    print(f'{i}: {repr(line)}')
"
          # Also inject signing props
          echo "MYAPP_UPLOAD_STORE_FILE=debug.keystore" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=androiddebugkey" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=android" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=android" >> android/gradle.properties
          # Copy Android debug keystore to app dir
          cp ~/.android/debug.keystore android/app/debug.keystore 2>/dev/null || \
            keytool -genkey -v -keystore android/app/debug.keystore -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android \
              -dname "CN=Debug,O=Android,C=US" 2>&1

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Rename APK
        run: |
          mkdir -p /home/runner/apk-output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            /home/runner/apk-output/Grocerease-Rider-debug-${{ github.sha }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Grocerease-Rider-debug-${{ github.sha }}
          path: /home/runner/apk-output/Grocerease-Rider-debug-${{ github.sha }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Debug Build #${{ github.run_number }}"
          body: |
            **Automatic debug build**
            Commit: `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
          files: /home/runner/apk-output/Grocerease-Rider-debug-${{ github.sha }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
