name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Generate native Android folder
        run: npx expo prebuild --platform android --no-install

      - name: Patch build.gradle signing config
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          # Replace empty MYAPP_UPLOAD_STORE_FILE with debug keystore path
          sed -i 's|def keystoreFile = project.env.get("MYAPP_UPLOAD_STORE_FILE")|def keystoreFile = "debug.keystore"|g' $BUILD_GRADLE
          sed -i 's|storeFile keystoreFile ? file(keystoreFile) : null|storeFile file("debug.keystore")|g' $BUILD_GRADLE
          sed -i 's|storeFile(keystoreFile)|storeFile(file("debug.keystore"))|g' $BUILD_GRADLE
          # Also inject signing props in case they are read from gradle.properties
          echo "MYAPP_UPLOAD_STORE_FILE=debug.keystore" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=androiddebugkey" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=android" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=android" >> android/gradle.properties
          # Print the first 20 lines of build.gradle for debugging
          echo "=== android/app/build.gradle (first 25 lines) ==="
          head -25 $BUILD_GRADLE

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore android/app/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>&1 || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Rename APK
        run: |
          mkdir -p /home/runner/apk-output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            /home/runner/apk-output/Grocerease-Rider-debug-${{ github.sha }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Grocerease-Rider-debug-${{ github.sha }}
          path: /home/runner/apk-output/Grocerease-Rider-debug-${{ github.sha }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Debug Build #${{ github.run_number }}"
          body: |
            **Automatic debug build**
            Commit: `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
          files: /home/runner/apk-output/Grocerease-Rider-debug-${{ github.sha }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
